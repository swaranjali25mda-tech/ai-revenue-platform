{% extends "base.html" %}
{% block content %}

<h2>Advanced Model Performance</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% else %}

<img src="/static/images/model_performance.png" width="700">

<h3>📊 Accuracy Metrics</h3>
<p>MAE: {{ mae }}</p>
<p>RMSE: {{ rmse }}</p>
<p>R² Score: {{ r2 }}</p>

{% endif %}

{% endblock %}
